<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b0f13;
      --surface: #131920;
      --surface2: #1a2330;
      --border: #1e2d3d;
      --accent-green: #00e5a0;
      --accent-amber: #f5a623;
      --accent-red: #ff4d4d;
      --accent-blue: #4dabf7;
      --text: #e8edf2;
      --text-muted: #6b7f94;
      --text-dim: #3a4f63;
      --font-mono: 'Space Mono', monospace;
      --font-sans: 'DM Sans', sans-serif;
    }

    body {
      width: 310px;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      overflow: hidden;
    }

    /* ---- HEADER ---- */
    .header {
      padding: 14px 16px 12px;
      background: linear-gradient(135deg, #0d1f2e 0%, #0b1520 100%);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      position: relative;
    }
    .header-icon {
      width: 28px; height: 28px;
      background: linear-gradient(135deg, var(--accent-green), #00b37a);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
      box-shadow: 0 0 12px rgba(0, 229, 160, 0.3);
    }
    .header-title {
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.5px;
    }
    .header-sub {
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 0.3px;
    }
    .header-count {
      margin-left: auto;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3px 10px;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--accent-green);
      display: flex; align-items: center; gap: 5px;
    }
    .count-dot {
      width: 6px; height: 6px;
      background: var(--accent-green);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(0.7); }
    }

    /* ---- SERVER INFO ---- */
    .server-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      font-size: 10.5px;
      color: var(--text-muted);
    }
    .server-bar .chip {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 7px;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--accent-blue);
    }
    .server-bar .sep { color: var(--text-dim); }
    .ci-badge {
      margin-left: auto;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-muted);
    }

    /* ---- MAIN STATS ---- */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: var(--border);
      border-bottom: 1px solid var(--border);
    }
    .stat-card {
      background: var(--surface);
      padding: 14px 16px;
      position: relative;
      overflow: hidden;
    }
    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
    }
    .stat-card.co2::before { background: linear-gradient(90deg, var(--accent-green), transparent); }
    .stat-card.elec::before { background: linear-gradient(90deg, var(--accent-amber), transparent); }

    .stat-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 6px;
      display: flex; align-items: center; gap: 5px;
    }
    .stat-label .icon { font-size: 11px; }
    .stat-value-row {
      display: flex;
      align-items: baseline;
      gap: 4px;
    }
    .stat-value {
      font-family: var(--font-mono);
      font-size: 22px;
      font-weight: 700;
      line-height: 1;
    }
    .stat-card.co2 .stat-value { color: var(--accent-green); }
    .stat-card.elec .stat-value { color: var(--accent-amber); }
    .stat-unit {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 400;
    }

    /* ---- EQUIVALENCES ---- */
    .equiv-section {
      padding: 12px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .equiv-label {
      font-size: 9.5px;
      font-weight: 600;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 2px;
    }
    .equiv-row {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
    }
    .equiv-icon {
      font-size: 16px;
      flex-shrink: 0;
      width: 24px;
      text-align: center;
    }
    .equiv-content {}
    .equiv-title {
      font-size: 9.5px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
    }
    .equiv-value {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text);
      margin-top: 1px;
    }

    /* ---- MODEL ROW ---- */
    .model-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      font-size: 11px;
    }
    .model-label { color: var(--text-muted); }
    .model-value {
      font-family: var(--font-mono);
      font-size: 10.5px;
      color: var(--accent-red);
      background: rgba(255, 77, 77, 0.08);
      border: 1px solid rgba(255, 77, 77, 0.2);
      padding: 2px 8px;
      border-radius: 4px;
    }

    /* ---- FORMULA HINT ---- */
    .formula-hint {
      padding: 8px 16px;
      background: #0d1520;
      border-bottom: 1px solid var(--border);
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--text-dim);
      line-height: 1.6;
    }
    .formula-hint span { color: #2a4060; }

    /* ---- RESET ---- */
    .footer {
      padding: 10px 16px;
      background: var(--bg);
    }
    #reset {
      width: 100%;
      padding: 8px;
      border: 1px solid #2a1a1a;
      border-radius: 6px;
      background: transparent;
      color: #66404040;
      cursor: pointer;
      font-family: var(--font-sans);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.3px;
      color: var(--text-muted);
      transition: all 0.2s;
    }
    #reset:hover {
      background: rgba(255, 77, 77, 0.08);
      border-color: rgba(255, 77, 77, 0.3);
      color: var(--accent-red);
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <div class="header-icon">🌱</div>
    <div>
      <div class="header-title">ECO-IA TRACKER</div>
      <div class="header-sub">Impact carbone · Gemini</div>
    </div>
    <div class="header-count">
      <div class="count-dot"></div>
      <span id="countDisplay">0</span> req.
    </div>
  </div>

  <!-- SERVER BAR -->
  <div class="server-bar">
    <span>Serveur</span>
    <span class="sep">›</span>
    <span class="chip" id="region">Détection...</span>
    <span class="ci-badge" id="ciValue">— gCO₂/kWh</span>
  </div>

  <!-- MAIN STATS -->
  <div class="stats-grid">
    <div class="stat-card co2">
      <div class="stat-label"><span class="icon">☁️</span> CO₂</div>
      <div class="stat-value-row">
        <span class="stat-value" id="co2Value">0</span>
        <span class="stat-unit" id="co2Unit">g</span>
      </div>
    </div>
    <div class="stat-card elec">
      <div class="stat-label"><span class="icon">⚡</span> Électricité</div>
      <div class="stat-value-row">
        <span class="stat-value" id="elecValue">0</span>
        <span class="stat-unit" id="elecUnit">Wh</span>
      </div>
    </div>
  </div>

  <!-- EQUIVALENCES -->
  <div class="equiv-section">
    <div class="equiv-label">Équivalences</div>
    <div class="equiv-row">
      <div class="equiv-icon">✈️</div>
      <div class="equiv-content">
        <div class="equiv-title">Vol Paris → New York</div>
        <div class="equiv-value" id="flightEquiv">—</div>
      </div>
    </div>
    <div class="equiv-row">
      <div class="equiv-icon">🏠</div>
      <div class="equiv-content">
        <div class="equiv-title">Foyer français alimenté</div>
        <div class="equiv-value" id="householdEquiv">—</div>
      </div>
    </div>
  </div>

  <!-- MODEL -->
  <div class="model-row">
    <span class="model-label">Modèle actif</span>
    <span class="model-value" id="modeleTxt">Aucun</span>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <button id="reset">Réinitialiser les statistiques</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
